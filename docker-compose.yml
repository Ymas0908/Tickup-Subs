services:

  mariadb:
    image: mariadb:11
    container_name: tickup-mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: tickupDB
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - tickup-network

  app:
    build: .
    container_name: tickup-app
    restart: always
    depends_on:
      - mariadb
    ports:
      - "9000:9000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/tickupDB
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - tickup-network
    volumes:
      - ./logs:/app/logs

  # Service de notification pour les emails (optionnel)
  mailhog:
    image: mailhog/mailhog
    container_name: tickup-mailhog
    restart: always
    ports:
      - "1025:1025"  # SMTP port
      - "8026:8025"  # Web interface (port 8026 au lieu de 8025)
    networks:
      - tickup-network

  # Service email externe (décommentez si l'image est disponible)
  # email-service:
  #   image: samuelkebe/email-service:latest
  #   container_name: email-service
  #   restart: always
  #   ports:
  #     - "9002:8080"  # Port hôte 9002 vers port container 8080
  #   networks:
  #     - tickup-network
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=docker
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

volumes:
  mariadb_data:

networks:
  tickup-network:
    driver: bridge
