<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <f:facet name="first">
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
    </f:facet>
    <title>DCC PROXY | Mot de passe oublié</title>


</h:head>

<h:body>
    <div class="login-container">
        <!-- Hero Section -->
        <div class="hero-section">
            <!-- Filigrane dispersé -->
            <span class="currency-symbol"
                  style="top: 5%; left: 5%; transform: rotate(-15deg); font-size: 60px;">€</span>

            <span class="currency-symbol"
                  style="top: 10%; left: 85%; transform: rotate(20deg); font-size: 50px;">¥</span>

            <span class="currency-symbol"
                  style="top: 20%; left: 40%; transform: rotate(10deg); font-size: 65px;">$</span>

            <span class="currency-symbol"
                  style="top: 30%; left: 10%; transform: rotate(-45deg); font-size: 45px;">XOF</span>

            <span class="currency-symbol"
                  style="top: 35%; left: 75%; transform: rotate(15deg); font-size: 50px;">₹</span>

            <span class="currency-symbol"
                  style="top: 50%; left: 50%; transform: rotate(-25deg); font-size: 75px;">₦</span>

            <span class="currency-symbol"
                  style="top: 60%; left: 15%; transform: rotate(5deg); font-size: 55px;">₹</span>

            <span class="currency-symbol"
                  style="top: 70%; left: 80%; transform: rotate(-10deg); font-size: 45px;">₵</span>

            <span class="currency-symbol"
                  style="top: 80%; left: 30%; transform: rotate(-30deg); font-size: 65px;">₺</span>

            <span class="currency-symbol"
                  style="top: 90%; left: 90%; transform: rotate(-20deg); font-size: 50px;">€</span>

            <span class="currency-symbol"
                  style="top: 85%; left: 10%; transform: rotate(35deg); font-size: 60px;">元</span>

            <!-- Contenu réel -->
            <div class="hero-content">
                <h1>DCC PROXY</h1>

                <div class="features">
                    <div class="feature-item animate-fade" style="animation-delay: 0.1s">
                        <div class="feature-icon">💱</div>
                    </div>
                    <div class="feature-item animate-fade" style="animation-delay: 0.2s">
                        <div class="feature-icon">🔒</div>
                    </div>
                    <div class="feature-item animate-fade" style="animation-delay: 0.3s">
                        <div class="feature-icon">📊</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="login-section">
            <div class="login-card animate-fade">
                <div class="logo-container">
                    <img src="#{resource['resources/images/logo.png']}" alt="Currency Converter"/>
                </div>

                <h2>Mot de passe oublié</h2>

                <h:form id="forgotPasswordForm" prependId="false">
                    <div class="form-group">
                        <label for="@next">Email</label>

                        <p:inputText id="email"
                                     placeholder="exemple@domaine.com" required="true"
                                     value="#{passwordRecoveryMB.email}"
                                     styleClass="input-field"/>
                    </div>

                    <p:commandButton value="Réinitialiser le mot de passe"
                                     ajax="false" process="forgotPasswordForm" action="#{passwordRecoveryMB.recovery()}"
                                     styleClass="login-button"/>

                    <div class="form-footer">
                        <p:link outcome="/auth/connexion" value="← Retour à la connexion"/>
                    </div>
                </h:form>
            </div>
        </div>
    </div>
    <h:outputStylesheet name="css/auth.css" library="demo"/>

    <p:growl id="growl" showDetail="true">
        <p:autoUpdate/>
    </p:growl>
</h:body>
</html>
