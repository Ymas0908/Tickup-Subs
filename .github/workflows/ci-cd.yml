name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: tickupDB
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h localhost" --health-interval=10s --health-timeout=30s --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Install Poseidon themes
      run: |
        mvn install:install-file \
          -Dfile=poseidon-theme-6.0.0-jakarta.jar \
          -DgroupId=org.primefaces.themes \
          -DartifactId=poseidon-jakarta \
          -Dversion=6.0.0 \
          -Dpackaging=jar
        mvn install:install-file \
          -Dfile=poseidon-theme-6.0.0.jar \
          -DgroupId=org.primefaces.themes \
          -DartifactId=poseidon \
          -Dversion=6.0.0 \
          -Dpackaging=jar

    - name: Wait for MariaDB to be ready
      run: |
        echo "Waiting for MariaDB to be ready..."
        for i in {1..30}; do
          if mysqladmin ping -h localhost --silent; then
            echo "MariaDB is ready!"
            break
          fi
          echo "Attempt $i/30: MariaDB not ready yet..."
          sleep 2
        done

    - name: Run tests
      run: mvn clean test
      env:
        SPRING_DATASOURCE_URL: jdbc:mariadb://localhost:3306/tickupDB
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/tickup-subs:latest
          ${{ secrets.DOCKER_USERNAME }}/tickup-subs:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /opt/tickup-subs
          docker-compose down
          docker pull ${{ secrets.DOCKER_USERNAME }}/tickup-subs:latest
          docker-compose up -d
          docker system prune -f
